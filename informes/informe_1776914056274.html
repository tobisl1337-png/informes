<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; padding:20px; font-family:Arial; background:#e2e8f0; }
.container { max-width:800px; margin:auto; background:white; border-radius:8px; overflow:hidden; }
.header img { width:100%; height:200px; object-fit:cover; }
.title { text-align:center; padding:15px; }
.section { padding:20px; }
.divider { border-top:3px dashed #3b82f6; margin-bottom:15px; }
.info { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.item { margin:5px 0; }
.label { font-weight:bold; }
</style>
</head>

<body>
<div class="container">

<div class="header">
<img src="https://raw.githubusercontent.com/tobisl1337-png/informes/main/logo.jpg">
</div>

<div class="title">
<h1>INFORME DE REVISIÓN</h1>
</div>

<div class="section">
<hr class="divider">
<h3>INFORMACIÓN DEL VEHÍCULO</h3>
<div class="info">
<div class="item"><span class="label">Cliente:</span> Matiar Carbajal</div>
<div class="item"><span class="label">Marca:</span> Nissan</div>
<div class="item"><span class="label">Modelo:</span> Frontier</div>
<div class="item"><span class="label">Año:</span> 2020</div>
<div class="item"><span class="label">Kms:</span> 244.333</div>
</div>
</div>

<div class="section">
<hr class="divider">
<h3>ENTIDAD INSPECTORA</h3>
<div class="info">
<div class="item">Nombre: Renzo Bazzo</div>
<div class="item">Teléfono: 092129666</div>
<div class="item"><span class="label">Fecha:</span> 23/4/2026</div>
</div>
</div>

<div class="section">
<hr class="divider">
<h3>RESULTADOS DE LA INSPECCIÓN</h3>
<p><b>motor:</b> tiene fallas</p>
</div>

</div>
</body>
</html>
